name: MaintainerForge
summary: Auditable maintainer automation for open source repositories
description: Classifies issues, scores PR risk, and produces reviewable maintainer signals.
author: Muhammad Ammar Fasya
inputs:
  mode:
    description: classify-issue, score-pr, or release-notes
    required: true
    default: classify-issue
runs:
  using: composite
  steps:
    - name: Install MaintainerForge
      shell: bash
      run: pip install .
    - name: Print version
      shell: bash
      run: python -c "import maintainerforge; print(maintainerforge.__version__)"
