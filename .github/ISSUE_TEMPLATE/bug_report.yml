name: Bug report
description: Report a reproducible problem
title: "bug: "
labels: [needs-triage]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0
